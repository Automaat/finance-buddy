name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  playwright:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: finance
          POSTGRES_PASSWORD: password
          POSTGRES_DB: finance
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://finance:password@localhost:5432/finance
      APP_PASSWORD: test
      CORS_ORIGINS: http://127.0.0.1:4173,http://localhost:4173
      SEED_DEV_DATA: 'true'
      PUBLIC_API_URL: http://127.0.0.1:8000
      PUBLIC_API_URL_BROWSER: http://127.0.0.1:8000
      E2E_BASE_URL: http://127.0.0.1:4173
      E2E_API_URL: http://127.0.0.1:8000
      E2E_FRONTEND_PORT: '4173'
      E2E_SKIP_WEBSERVER: '1'
      NODE_ENV: production

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          experimental: true
        env:
          MISE_PYTHON_COMPILE: '0'

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: uv sync
        working-directory: backend

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build frontend
        run: npm run build

      - name: Start backend
        run: |
          uv run uvicorn app.main:app \
            --host 127.0.0.1 --port 8000 --log-level warning \
            > "${GITHUB_WORKSPACE}/backend.log" 2>&1 &
          echo $! > "${GITHUB_WORKSPACE}/backend.pid"
        working-directory: backend

      - name: Wait for backend health
        run: |
          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8000/health > /dev/null; then
              echo "backend ready"; exit 0
            fi
            sleep 1
          done
          echo "backend did not become healthy"
          cat backend.log || true
          exit 1

      - name: Start frontend
        env:
          PORT: '4173'
          HOST: 127.0.0.1
          ORIGIN: http://127.0.0.1:4173
        run: |
          node build > "${GITHUB_WORKSPACE}/frontend.log" 2>&1 &
          echo $! > "${GITHUB_WORKSPACE}/frontend.pid"

      - name: Wait for frontend
        run: |
          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:4173/ > /dev/null; then
              echo "frontend ready"; exit 0
            fi
            sleep 1
          done
          echo "frontend did not start"
          cat frontend.log || true
          exit 1

      - name: Run Playwright tests
        run: npx playwright test

      - name: Stop services
        if: always()
        run: |
          [ -f backend.pid ] && kill "$(cat backend.pid)" || true
          [ -f frontend.pid ] && kill "$(cat frontend.pid)" || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-test-results
          path: test-results
          retention-days: 14

      - name: Upload server logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: server-logs
          path: |
            backend.log
            frontend.log
          retention-days: 14
