name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  playwright:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: finance
          POSTGRES_PASSWORD: password
          POSTGRES_DB: finance
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://finance:password@localhost:5432/finance
      APP_PASSWORD: test
      CORS_ORIGINS: http://127.0.0.1:4173,http://localhost:4173
      PUBLIC_API_URL: http://127.0.0.1:8000
      PUBLIC_API_URL_BROWSER: http://127.0.0.1:4173
      API_PROXY_TARGET: http://127.0.0.1:8000
      FB_JWT_SECRET: e2e-test-jwt-secret
      FB_ADMIN_USERNAME: e2e-admin
      FB_ADMIN_PASSWORD: e2e-admin-password
      FB_COOKIE_SECURE: 'false'
      E2E_BASE_URL: http://127.0.0.1:4173
      E2E_API_URL: http://127.0.0.1:8000
      E2E_FRONTEND_PORT: '4173'
      E2E_SKIP_WEBSERVER: '1'
      NODE_ENV: production

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          experimental: true
        env:
          MISE_PYTHON_COMPILE: '0'

      - name: Override mise NODE_ENV
        run: echo "NODE_ENV=production" >> "$GITHUB_ENV"

      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: backend-go/go.mod
          cache-dependency-path: backend-go/go.sum

      - name: Install frontend dependencies
        run: npm ci --include=dev

      - name: Install bb-tests deps (for the seed script)
        run: uv sync
        working-directory: backend-bb-tests

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build frontend
        env:
          NODE_ENV: production
        run: NODE_ENV=production npm run build

      - name: Verify production build mode
        run: |
          echo "NODE_ENV=$NODE_ENV"
          grep -E 'get_global_name|__sveltekit_dev' build/server/index.js | head -3
          if grep -q '"__sveltekit_dev"' build/server/index.js; then
            echo "::error::SK built in DEV mode despite NODE_ENV=production"
            exit 1
          fi

      - name: Build backend-go
        run: go build -o "${GITHUB_WORKSPACE}/backend-go-bin" ./cmd/api
        working-directory: backend-go

      # backend-go applies internal/db/schema.sql to the empty database itself.
      - name: Start backend
        run: |
          "${GITHUB_WORKSPACE}/backend-go-bin" \
            > "${GITHUB_WORKSPACE}/backend.log" 2>&1 &
          echo $! > "${GITHUB_WORKSPACE}/backend.pid"
        env:
          FB_ADDR: '127.0.0.1:8000'

      - name: Wait for backend health
        run: |
          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8000/health > /dev/null; then
              echo "backend ready"
              break
            fi
            sleep 1
          done
          if ! curl -fsS http://127.0.0.1:8000/health > /dev/null; then
            echo "backend did not become healthy"
            cat backend.log || true
            exit 1
          fi

      - name: Seed fixture data
        run: |
          uv run python -c "
          import sys
          sys.path.insert(0, '.')
          from fixtures.seed import seed
          seed('${DATABASE_URL}')
          "
        working-directory: backend-bb-tests
        env:
          BB_ALLOW_DESTRUCTIVE_SEED: '1'

      - name: Start frontend
        env:
          NODE_ENV: production
          PORT: '4173'
          HOST: 127.0.0.1
          ORIGIN: http://127.0.0.1:4173
        run: |
          NODE_ENV=production node build > "${GITHUB_WORKSPACE}/frontend.log" 2>&1 &
          echo $! > "${GITHUB_WORKSPACE}/frontend.pid"

      - name: Wait for frontend
        run: |
          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:4173/ > /dev/null; then
              echo "frontend ready"; exit 0
            fi
            sleep 1
          done
          echo "frontend did not start"
          cat frontend.log || true
          exit 1

      - name: Run Playwright tests
        run: npx playwright test

      - name: Stop services
        if: always()
        run: |
          [ -f backend.pid ] && kill "$(cat backend.pid)" || true
          [ -f frontend.pid ] && kill "$(cat frontend.pid)" || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-test-results
          path: test-results
          retention-days: 14

      - name: Upload server logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: server-logs
          path: |
            backend.log
            frontend.log
          retention-days: 14
