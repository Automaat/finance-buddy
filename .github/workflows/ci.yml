name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          experimental: true
        env:
          MISE_PYTHON_COMPILE: '0'

      - name: Install dependencies
        run: npm ci

      - name: API types drift check
        run: |
          npm run gen:api-types
          if ! git diff --exit-code src/lib/types/api.generated.ts; then
            echo "::error::src/lib/types/api.generated.ts is stale." \
                 "Regenerate with: npm run gen:api-types — and commit the result."
            exit 1
          fi

      - name: Run linter
        run: npm run lint

      - name: Run type check
        run: npm run check

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload frontend coverage
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage

      - name: Build
        run: npm run build

  bb-tests-go:
    # Black-box parity gate: runs only the endpoints that have been cut over
    # to backend-go. Expand the test list in this job with each cutover PR.
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: bb
          POSTGRES_PASSWORD: bb
          POSTGRES_DB: bb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      BB_DSN: postgresql://bb:bb@localhost:5432/bb
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          experimental: true
        env:
          MISE_PYTHON_COMPILE: '0'

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: backend-go/go.mod
          cache-dependency-path: backend-go/go.sum

      - name: Install bb-tests deps
        run: uv sync
        working-directory: backend-bb-tests

      - name: Lint bb-tests
        run: |
          uv run --with ruff ruff check .
          uv run --with ruff ruff format --check .
        working-directory: backend-bb-tests

      # conftest.py builds + launches backend-go (which applies
      # internal/db/schema.sql to the empty CI database itself) and seeds the
      # fixtures — no Alembic, no separate start/seed steps.
      - name: Run black-box tests against backend-go
        run: uv run pytest -v
        working-directory: backend-bb-tests
        env:
          BB_DATABASE_URL: ${{ env.BB_DSN }}
          BB_ALLOW_DESTRUCTIVE_SEED: '1'

  go-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: backend-go/go.mod
          cache-dependency-path: backend-go/go.sum

      - name: go vet
        run: go vet ./...
        working-directory: backend-go

      - name: go test
        run: go test ./...
        working-directory: backend-go

      - name: OpenAPI spec drift check
        run: |
          go run ./cmd/gen-openapi
          if ! git diff --exit-code ../api/openapi-go.json; then
            echo "::error::api/openapi-go.json is stale." \
                 "Regenerate with: (cd backend-go && go run ./cmd/gen-openapi)" \
                 "and commit the result."
            exit 1
          fi
        working-directory: backend-go

  lint-go:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: backend-go/go.mod
          cache-dependency-path: backend-go/go.sum

      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2
          working-directory: backend-go

  lint-nilaway:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: backend-go/go.mod
          cache-dependency-path: backend-go/go.sum

      - name: Run nilaway
        run: ./scripts/run-nilaway.sh backend-go github.com/Automaat/finance-buddy/backend-go

  docker-publish:
    runs-on: ubuntu-24.04
    needs: [frontend, bb-tests-go, go-tests, lint-go, lint-nilaway]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      always() &&
      needs.frontend.result == 'success' &&
      needs.bb-tests-go.result == 'success' &&
      needs.go-tests.result == 'success' &&
      needs.lint-go.result == 'success' &&
      needs.lint-nilaway.result == 'success'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to ghcr.io
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push frontend
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/automaat/finance-buddy-frontend:latest
            ghcr.io/automaat/finance-buddy-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend-go
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./backend-go
          push: true
          tags: |
            ghcr.io/automaat/finance-buddy-backend-go:latest
            ghcr.io/automaat/finance-buddy-backend-go:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
