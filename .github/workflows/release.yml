name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.2.3) — empty = auto-bump minor from last tag'
        required: false
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Compute version
        run: |
          INPUT="${{ inputs.version }}"
          INPUT="${INPUT#v}"

          if [ -n "$INPUT" ]; then
            VERSION="$INPUT"
          else
            LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
            if [ -z "$LATEST" ]; then
              VERSION="0.1.0"
            else
              LATEST="${LATEST#v}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
              VERSION="$MAJOR.$((MINOR + 1)).0"
            fi
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Tag and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v$VERSION"
          git push origin "v$VERSION"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          if [ -n "$PREV" ]; then
            NOTES=$(git log --oneline "$PREV..HEAD")
          else
            NOTES=$(git log --oneline)
          fi

          gh release create "v$VERSION" --title "v$VERSION" --notes "$NOTES"

      - name: Log in to ghcr.io
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push frontend
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/automaat/finance-buddy-frontend:latest
            ghcr.io/automaat/finance-buddy-frontend:v${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend-go
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./backend-go
          push: true
          tags: |
            ghcr.io/automaat/finance-buddy-backend-go:latest
            ghcr.io/automaat/finance-buddy-backend-go:v${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
