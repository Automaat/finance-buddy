# Per-endpoint cutover routing.
#
# `default`: every request that doesn't match a rule below goes here. During
# migration, leave this pointed at the Python backend.
#
# `rules`: evaluated top-down, first match wins. Each rule routes a single
# (method, path-prefix) tuple at the Go backend. Add entries one at a time
# as endpoints are ported and pass the bb-tests parity suite.

default: http://backend:8000

rules:
  # Group 1 — /api/config cut over to Go (see migration/CUTOVER.md).
  - method: GET
    path_prefix: /api/config
    upstream: http://backend-go:8000
  - method: PUT
    path_prefix: /api/config
    upstream: http://backend-go:8000
  # Group 2 — /api/personas cut over to Go (incl. 5-table owner-rename cascade).
  - method: GET
    path_prefix: /api/personas
    upstream: http://backend-go:8000
  - method: POST
    path_prefix: /api/personas
    upstream: http://backend-go:8000
  - method: PUT
    path_prefix: /api/personas
    upstream: http://backend-go:8000
  - method: DELETE
    path_prefix: /api/personas
    upstream: http://backend-go:8000
  # Group 3 — /api/goals cut over to Go.
  - method: GET
    path_prefix: /api/goals
    upstream: http://backend-go:8000
  - method: POST
    path_prefix: /api/goals
    upstream: http://backend-go:8000
  - method: PUT
    path_prefix: /api/goals
    upstream: http://backend-go:8000
  - method: DELETE
    path_prefix: /api/goals
    upstream: http://backend-go:8000
  # Group 4a — /api/company-valuations cut over to Go.
  - method: GET
    path_prefix: /api/company-valuations
    upstream: http://backend-go:8000
  - method: POST
    path_prefix: /api/company-valuations
    upstream: http://backend-go:8000
  - method: PATCH
    path_prefix: /api/company-valuations
    upstream: http://backend-go:8000
  - method: DELETE
    path_prefix: /api/company-valuations
    upstream: http://backend-go:8000
  # Group 4b — /api/bonuses cut over to Go (incl. FX cache + NBP fetch).
  - method: GET
    path_prefix: /api/bonuses
    upstream: http://backend-go:8000
  - method: POST
    path_prefix: /api/bonuses
    upstream: http://backend-go:8000
  - method: PATCH
    path_prefix: /api/bonuses
    upstream: http://backend-go:8000
  - method: DELETE
    path_prefix: /api/bonuses
    upstream: http://backend-go:8000
  # Group 4c — /api/equity-grants cut over to Go (vesting math + paper-value + FX).
  - method: GET
    path_prefix: /api/equity-grants
    upstream: http://backend-go:8000
  - method: POST
    path_prefix: /api/equity-grants
    upstream: http://backend-go:8000
  - method: PATCH
    path_prefix: /api/equity-grants
    upstream: http://backend-go:8000
  - method: DELETE
    path_prefix: /api/equity-grants
    upstream: http://backend-go:8000
  # Group 5 — /api/cpi cut over to Go (GUS BDL fetch + inflation math).
  - method: GET
    path_prefix: /api/cpi
    upstream: http://backend-go:8000
  - method: POST
    path_prefix: /api/cpi
    upstream: http://backend-go:8000
  # Group 6 — /api/salaries cut over to Go (CRUD + CPI-derived inflation_context).
  - method: GET
    path_prefix: /api/salaries
    upstream: http://backend-go:8000
  - method: POST
    path_prefix: /api/salaries
    upstream: http://backend-go:8000
  - method: PATCH
    path_prefix: /api/salaries
    upstream: http://backend-go:8000
  - method: DELETE
    path_prefix: /api/salaries
    upstream: http://backend-go:8000
  # Group 7 — /api/zus cut over to Go (pension projection + salary-history prefill).
  - method: GET
    path_prefix: /api/zus
    upstream: http://backend-go:8000
  - method: POST
    path_prefix: /api/zus
    upstream: http://backend-go:8000
  # Group 9a — /api/accounts cut over to Go (incl. cascade aggregate recompute on owner/category change).
  - method: GET
    path_prefix: /api/accounts
    upstream: http://backend-go:8000
  - method: POST
    path_prefix: /api/accounts
    upstream: http://backend-go:8000
  - method: PUT
    path_prefix: /api/accounts
    upstream: http://backend-go:8000
  - method: DELETE
    path_prefix: /api/accounts
    upstream: http://backend-go:8000
  # Group 9b — /api/assets cut over to Go (cascade recompute on soft-delete).
  - method: GET
    path_prefix: /api/assets
    upstream: http://backend-go:8000
  - method: POST
    path_prefix: /api/assets
    upstream: http://backend-go:8000
  - method: PUT
    path_prefix: /api/assets
    upstream: http://backend-go:8000
  - method: DELETE
    path_prefix: /api/assets
    upstream: http://backend-go:8000
  # Group 9c — /api/snapshots cut over to Go (atomic create/update with full recompute).
  - method: GET
    path_prefix: /api/snapshots
    upstream: http://backend-go:8000
  - method: POST
    path_prefix: /api/snapshots
    upstream: http://backend-go:8000
  - method: PUT
    path_prefix: /api/snapshots
    upstream: http://backend-go:8000
  # Group 8 — transactions / debt_payments / debts cut over to Go.
  # Sub-routes under /api/accounts/{id}/(transactions|payments|debts) already
  # match the /api/accounts prefix above; landing these here also covers the
  # top-level /api/transactions, /api/payments, /api/debts collections.
  - method: GET
    path_prefix: /api/transactions
    upstream: http://backend-go:8000
  - method: GET
    path_prefix: /api/payments
    upstream: http://backend-go:8000
  - method: GET
    path_prefix: /api/debts
    upstream: http://backend-go:8000
  - method: POST
    path_prefix: /api/debts
    upstream: http://backend-go:8000
  - method: PUT
    path_prefix: /api/debts
    upstream: http://backend-go:8000
  - method: DELETE
    path_prefix: /api/debts
    upstream: http://backend-go:8000
