# Scoped ruff config for migration tooling (perf runner, etc.).
# Migration scripts are developer tools — they call subprocess with controlled
# argv and emit logs to stdout. The strict audit (S*) and print-detection (T*)
# rules don't add value here, so we drop them but keep the structural ones.

line-length = 100
target-version = "py314"

[lint]
select = ["E", "F", "I", "W", "UP", "B", "RET", "SIM"]
