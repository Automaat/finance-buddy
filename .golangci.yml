version: '2'

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  default: standard
  enable:
    # bug catchers (high signal, low noise)
    - asasalint
    - bidichk
    - bodyclose
    - copyloopvar
    - durationcheck
    - errorlint
    - exhaustive
    - fatcontext
    - intrange
    - loggercheck
    - makezero
    - mirror
    - musttag
    - nilerr
    - nilnesserr
    - nilnil
    - noctx
    - nonamedreturns
    - reassign
    - recvcheck
    - sloglint
    - wastedassign

    # quality / perf
    - dupword
    - errname
    - exptostd
    - funlen
    - gocheckcompilerdirectives
    - gocritic
    - goprintffuncname
    - gosec
    - misspell
    - modernize
    - nolintlint
    - nosprintfhostport
    - perfsprint
    - predeclared
    - testableexamples
    - thelper
    - unconvert
    - unparam
    - usestdlibvars
    - usetesting
    - whitespace

    # dependency hygiene
    - depguard
    - gomodguard_v2

  settings:
    depguard:
      rules:
        non-test:
          files:
            - '!$test'
          deny:
            - pkg: math/rand$
              desc: use math/rand/v2 instead
            - pkg: io/ioutil
              desc: use os/io instead (deprecated since Go 1.16)
        non-main:
          files:
            - '!**/main.go'
          deny:
            - pkg: log$
              desc: use log/slog instead

    errcheck:
      check-type-assertions: true

    exhaustive:
      default-signifies-exhaustive: true

    funlen:
      lines: 100
      statements: 70

    gosec:
      excludes:
        - G204 # subprocess args — validated at construction
        - G304 # file inclusion via variable — intentional in this app
        - G124 # session cookie Secure flag is runtime-configurable (FB_COOKIE_SECURE) for plain-HTTP LAN deploys
        - G404 # math/rand/v2 is correct for Monte Carlo and other statistical sampling — crypto/rand is wrong here

    govet:
      enable-all: true
      disable:
        - fieldalignment # struct field reordering rarely worth churn
        - shadow # idiomatic Go re-declares err in nested blocks
        - unusedwrite # too aggressive on test struct literals

    gocritic:
      enabled-checks:
        - badLock
        - badRegexp
        - badSorting
        - boolExprSimplify
        - builtinShadow
        - builtinShadowDecl
        - commentedOutCode
        - deferInLoop
        - emptyFallthrough
        - equalFold
        - hexLiteral
        - httpNoBody
        - importShadow
        - indexAlloc
        - initClause
        - nestingReduce
        - nilValReturn
        - octalLiteral
        - paramTypeCombine
        - preferFilepathJoin
        - preferFprint
        - preferStringWriter
        - preferWriteByte
        - ptrToRefParam
        - rangeExprCopy
        - rangeValCopy
        - redundantSprint
        - regexpPattern
        - regexpSimplify
        - returnAfterHttpError
        - sloppyReassign
        - sortSlice
        - sprintfQuotedString
        - sqlQuery
        - stringConcatSimplify
        - stringXbytes
        - timeExprSimplify
        - tooManyResultsChecker
        - truncateCmp
        - typeAssertChain
        - typeDefFirst
        - typeUnparen
        - unlabelStmt
        - unnecessaryBlock
        - unnecessaryDefer
        - weakCond
        - yodaStyleExpr

    nolintlint:
      require-explanation: true
      require-specific: true
      allow-no-explanation:
        - funlen

    perfsprint:
      strconcat: false # noisy on logging-heavy code
      error-format: false
      errorf: false

    sloglint:
      no-mixed-args: true

    misspell:
      locale: US

    gomodguard_v2:
      blocked:
        - module: github.com/pkg/errors
          recommendations:
            - errors
          reason: stdlib errors covers wrapping since Go 1.13
        - module: golang.org/x/exp/maps
          recommendations:
            - maps
        - module: golang.org/x/exp/slices
          recommendations:
            - slices
        - module: io/ioutil
          recommendations:
            - io
            - os
          reason: deprecated since Go 1.16

  exclusions:
    warn-unused: true
    presets:
      - common-false-positives
      - std-error-handling
    rules:
      - linters:
          - bodyclose
          - dupword
          - errcheck
          - funlen
          - gosec
        path: _test\.go

formatters:
  enable:
    - gci
    - gofumpt
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/Automaat/finance-buddy/backend-go)
      custom-order: true
