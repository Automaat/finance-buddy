services:
  postgres:
    image: postgres:18-alpine
    container_name: finance-postgres
    environment:
      - POSTGRES_USER=finance
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=finance
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - '${POSTGRES_HOST_PORT:-5433}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U finance']
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: finance-backend
    volumes:
      - ./backend:/app
    expose:
      - '8000'
    environment:
      - DATABASE_URL=postgresql://finance:${POSTGRES_PASSWORD:-password}@postgres:5432/finance
      - APP_PASSWORD=${APP_PASSWORD:-changeme}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5174,http://localhost:3000}
      - SEED_DEV_DATA=${SEED_DEV_DATA:-true}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          'import urllib.request; urllib.request.urlopen("http://localhost:8000/health")'
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  backend-go:
    build:
      context: ./backend-go
    container_name: finance-backend-go
    expose:
      - '8000'
    environment:
      - DATABASE_URL=postgresql://finance:${POSTGRES_PASSWORD:-password}@postgres:5432/finance
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5174,http://localhost:3000}
      - FB_ADDR=:8000
    depends_on:
      postgres:
        condition: service_healthy

  proxy:
    build:
      context: ./migration/proxy
    container_name: finance-proxy
    ports:
      - '8080:8080'
    volumes:
      - ./migration/proxy/routes.yaml:/etc/proxy/routes.yaml:ro
    depends_on:
      backend:
        condition: service_healthy
      backend-go:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: finance-frontend
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - '5174:5173'
    environment:
      - PUBLIC_API_URL=http://proxy:8080
      - PUBLIC_API_URL_BROWSER=http://localhost:8080
    depends_on:
      - proxy

volumes:
  postgres-data:
