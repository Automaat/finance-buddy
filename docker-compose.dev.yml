services:
  postgres:
    image: postgres:18-alpine
    container_name: finance-postgres
    environment:
      - POSTGRES_USER=finance
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=finance
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - '${POSTGRES_HOST_PORT:-5433}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U finance']
      interval: 5s
      timeout: 3s
      retries: 5

  backend-go:
    build:
      context: ./backend-go
    container_name: finance-backend-go
    ports:
      - '8000:8000'
    environment:
      - DATABASE_URL=postgresql://finance:${POSTGRES_PASSWORD:-password}@postgres:5432/finance
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5174,http://localhost:3000}
      - FB_ADDR=:8000
      - FB_JWT_SECRET=${FB_JWT_SECRET:-dev-jwt-secret-change-me}
      - FB_ADMIN_USERNAME=${FB_ADMIN_USERNAME:-admin}
      - FB_ADMIN_PASSWORD=${FB_ADMIN_PASSWORD:-admin}
      - FB_COOKIE_SECURE=false
      - FB_STOOQ_APIKEY=${FB_STOOQ_APIKEY:-}
      - FB_FRED_API_KEY=${FB_FRED_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', '/usr/local/bin/api', 'healthcheck']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  seed:
    build:
      context: ./backend-bb-tests/fixtures
      dockerfile: Dockerfile.seed
    container_name: finance-seed
    environment:
      - DATABASE_URL=postgresql://finance:${POSTGRES_PASSWORD:-password}@postgres:5432/finance
    depends_on:
      backend-go:
        condition: service_healthy
    restart: 'no'

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: finance-frontend
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - '5174:5173'
    environment:
      - PUBLIC_API_URL=http://backend-go:8000
      - PUBLIC_API_URL_BROWSER=http://localhost:5174
      - API_PROXY_TARGET=http://backend-go:8000
      - FB_COOKIE_SECURE=false
    depends_on:
      backend-go:
        condition: service_healthy

volumes:
  postgres-data:
